# NEXUS FCT Dashboard - Nginx 反向代理配置
# 用法:
#   1. 将 YOUR_DOMAIN 替换为你的域名
#   2. sudo ln -s /opt/nexus-fct/deploy/nexus-fct-nginx.conf /etc/nginx/sites-enabled/
#   3. sudo nginx -t && sudo systemctl reload nginx
#
# 可选: 用 certbot 自动配置 SSL
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d YOUR_DOMAIN

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # 如果使用 certbot，certbot 会自动把下面这行改成 443 SSL
    # 并把 listen 80 改成重定向

    # 请求大小限制（FCT XML 文件可能较大）
    client_max_body_size 50m;

    # 反向代理到 Gunicorn
    location / {
        proxy_pass http://127.0.0.1:59488;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（预留）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }

    # 静态文件缓存（可选）
    location /static/ {
        alias /opt/nexus-fct/frontend/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 安全头
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
